document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

; height: 0; }\n  .wb-scroll { scrollbar-width: none; }\n  @keyframes msgIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }\n  @keyframes steam { 0% { opacity: 0; transform: translateY(2px) scaleY(0.8); } 40% { opacity: .55; } 100% { opacity: 0; transform: translateY(-16px) scaleY(1.2); } }\n  @keyframes micpulse { 0% { box-shadow: 0 0 0 0 var(--accent-soft); } 70% { box-shadow: 0 0 0 12px rgba(0,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); } }\n  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }\n  @keyframes chapterIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }\n  @keyframes listenring { 0% { transform: scale(1); opacity: .5; } 100% { transform: scale(2.5); opacity: 0; } }\n  @keyframes vbar { 0%,100% { transform: scaleY(0.5); } 50% { transform: scaleY(1.15); } }\n  /* Full-bleed on phones; framed mockup on tablet/desktop */\n  @media (max-width: 700px) {\n    .wb-desk { padding: 0 !important; background: var(--bg) !important; align-items: stretch !important; }\n    .wb-phone { width: 100% !important; height: 100vh !important; height: 100dvh !important; max-height: none !important; border-radius: 0 !important; box-shadow: none !important; padding-bottom: env(safe-area-inset-bottom) !important; }\n    .wb-notch { display: none !important; }\n    .wb-time, .wb-battery { display: none !important; }\n    .wb-statusbar { height: auto !important; min-height: 18px; padding-top: calc(env(safe-area-inset-top, 8px) + 10px) !important; justify-content: flex-end !important; }\n  }\n<\u002Fstyle>\n<script>\n/* PWA install / Home-Screen plumbing. Injected at runtime so it survives the\n   self-contained bundle's rehydration. All tags created via JS so the bundler\n   never inlines the manifest / icons. */\n(function () {\n  function meta(n, c) { var m = document.createElement('meta'); m.setAttribute('name', n); m.setAttribute('content', c); document.head.appendChild(m); }\n  function link(rel, href, type) { var l = document.createElement('link'); l.setAttribute('rel', rel); l.setAttribute('href', href); if (type) l.setAttribute('type', type); document.head.appendChild(l); }\n  var v = document.querySelector('meta[name=\"viewport\"]');\n  if (!v) { v = document.createElement('meta'); v.setAttribute('name', 'viewport'); document.head.appendChild(v); }\n  v.setAttribute('content', 'width=device-width, initial-scale=1, viewport-fit=cover');\n  document.title = 'White Bunny Morning';\n  meta('theme-color', '#F1E9DE');\n  meta('apple-mobile-web-app-capable', 'yes');\n  meta('mobile-web-app-capable', 'yes');\n  meta('apple-mobile-web-app-status-bar-style', 'default');\n  meta('apple-mobile-web-app-title', 'Morning');\n  link('manifest', 'manifest.webmanifest');\n  link('apple-touch-icon', 'icons/apple-touch-icon.png');\n  link('icon', 'icons/icon-192.png', 'image/png');\n  if ('serviceWorker' in navigator) {\n    window.addEventListener('load', function () { navigator.serviceWorker.register('service-worker.js').catch(function () {}); });\n  }\n})();\n<\u002Fscript>\n<\u002Fhelmet>\n<div ref=\"{{ rootRef }}\" class=\"wb-desk\" style=\"--bg:#F1E9DE;--panel:#FBF6EF;--ink:#3B322A;--muted:#9C8E7D;--line:#E7DBCB;--accent:#BE7C4E;--accent-soft:#F0DFCE;--coach:#FBF6EF;--user:#EBD9C4; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:22px; background:#E3D8C6; font-family:Nunito,system-ui,sans-serif;\">\n\n  <!-- PHONE -->\n  <div class=\"wb-phone\" style=\"position:relative; width:392px; height:850px; max-height:calc(100vh - 20px); background:var(--bg); border-radius:48px; box-shadow:0 40px 90px -30px rgba(59,40,20,0.55), 0 0 0 10px #17120c, 0 0 0 12px #2c231a; overflow:hidden; display:flex; flex-direction:column;\">\n\n    <!-- notch -->\n    <div class=\"wb-notch\" style=\"position:absolute; top:11px; left:50%; transform:translateX(-50%); width:120px; height:30px; background:#1712 c\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:900},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;latte&quot;,&quot;sage&quot;,&quot;blush&quot;],&quot;default&quot;:&quot;latte&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Aesthetic&quot;}}\">\nclass Component extends DCLogic {\n  rootRef = React.createRef();\n  msgRef = React.createRef();\n  rec = null;\n\n  THEMES = {\n    latte: { bg:'#F1E9DE', panel:'#FBF6EF', ink:'#3B322A', muted:'#9C8E7D', line:'#E7DBCB', accent:'#BE7C4E', 'accent-soft':'#F0DFCE', coach:'#FBF6EF', user:'#EBD9C4' },\n    sage:  { bg:'#E9EBE1', panel:'#F7F8F1', ink:'#333829', muted:'#8C917C', line:'#DDE0D2', accent:'#7E8C5A', 'accent-soft':'#E2E7D2', coach:'#F7F8F1', user:'#DCE4C9' },\n    blush: { bg:'#F3E7E1', panel:'#FCF4F0', ink:'#41332D', muted:'#A98F84', line:'#EBD8CF', accent:'#C27B62', 'accent-soft':'#F3DED4', coach:'#FCF4F0', user:'#F0D6CB' },\n  };\n\n  DOMAINS = [\n    { key:'health', label:'Health', subtitle:'Your body & energy',\n      resultQ:\"Let's start with your body. What one result will you create for your health today?\",\n      purposeAck:\"That's a real result. Now the fuel \\u2014 why must this happen today?\",\n      actionsAck:\"Beautiful. Let's brain-dump. Add every action that could move this \\u2014 no order, no filter.\",\n      leverageTip:\"Here's the secret: don't pick the easiest one. Pick the single action that makes the rest almost automatic \\u2014 usually the one you're quietly avoiding.\" },\n    { key:'work', label:'Work', subtitle:\"What you'll create today\",\n      transitionIn:\"Health's locked in. Now let's turn to your work.\",\n      resultQ:\"Now your work. What's the ONE result you're committed to creating today?\",\n      purposeAck:\"Good. And why does that result matter \\u2014 what does it move you toward?\",\n      actionsAck:\"Dump every action you could take on this. Messy is fine \\u2014 we'll find the leverage next.\",\n      leverageTip:\"Leverage question: which one action, done first, makes everything else on this list faster or unnecessary?\" },\n    { key:'life', label:'Life', subtitle:'Everything else that matters',\n      transitionIn:\"That's Health and Work locked in. Now let's make sure life doesn't get forgotten.\",\n      resultQ:\"Away from work and health \\u2014 what's one thing in your personal life that matters today? Think family, home, a friend, an errand, or a hobby.\",\n      purposeAck:\"Nice. Why does that matter to you today?\",\n      actionsAck:\"What could you do today to make that happen? Add whatever comes to mind.\",\n      leverageTip:\"Of these, which one matters most today?\" },\n  ];\n\n  THOUGHTS = [\n    \"Before the world asks for your attention, decide where you'll invest it.\",\n    \"Today's success won't come from doing everything \\u2014 it comes from choosing the right things.\",\n    \"Clarity creates momentum. Let's find today's leverage.\",\n    \"Small intentional actions have a habit of becoming extraordinary results.\",\n    \"The best days aren't accidental. They're designed.\",\n    \"Make today feel lighter by choosing what truly matters.\",\n    \"A calm mind makes better decisions. Let's begin there.\",\n    \"Some days require hustle. Today might simply require clarity.\",\n    \"You don't need more hours. You need more leverage.\",\n    \"Progress isn't built by busy. It's built by direction.\",\n    \"Most overwhelm is simply unmade decisions.\",\n    \"One good decision can change the whole day.\",\n    \"Protect your attention before the world borrows it.\",\n    \"Tiny actions. Big trajectory.\",\n    \"Momentum is easier to keep than it is to create.\",\n    \"Today isn't about perfection. It's about movement.\",\n    \"Choose the one thing that makes the rest easier.\",\n    \"Direction beats speed every single morning.\",\n    \"You can't do it all \\u2014 and you were never meant to.\",\n    \"Quiet focus is a kind of superpower.\",\n    \"The list can wait. The leverage can't.\",\n    \"Start with the action you're quietly avoiding.\",\n    \"A day with one clear result is a day well spent.\",\n    \"What you protect this morning, you'll thank yourself for tonight.\",\n    \"Busyness is not the same as progress.\",\n    \"Decide once, this morning, and let the whole day get simpler.\",\n    \"The right small step today outperforms the perfect plan tomorrow.\",\n    \"Momentum loves a calm beginning.\",\n    \"Keep your systems light and they'll carry you further.\",\n    \"Overwhelm shrinks the moment you name your one result.\",\n    \"Do less \\u2014 but finish it.\",\n    \"Today's leverage is often hiding in the thing that scares you slightly.\",\n    \"Give the morning your clearest thinking; the day rarely gets quieter.\",\n    \"One honest priority is worth ten vague intentions.\",\n    \"Move gently, but move on purpose.\",\n    \"The calm you create this morning becomes the day you live.\",\n    \"Win the morning by choosing, not scrambling.\",\n    \"Choose better. Live lighter.\",\n    \"Focus is just a series of small, brave no's.\",\n    \"You are one clear decision away from a lighter day.\",\n  ];\n\n  ymd(d) {\n    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');\n  }\n  dayOfYear(d) {\n    const start = new Date(d.getFullYear(), 0, 0);\n    return Math.floor((d - start) / 86400000);\n  }\n\n  freshData() {\n    return { health:{result:'',purpose:'',actions:[]}, work:{result:'',purpose:'',actions:[]}, life:{result:'',purpose:'',actions:[]} };\n  }\n\n  state = {\n    view: 'welcome', theme: 'latte', domainIndex: 0, phase: 'result',\n    data: this.freshData(), messages: [], draft: '', listening: false,\n    micUnsupported: false, micError: '', activeTab: 'plan',\n    streak: { count: 0, lastDone: null },\n  };\n\n  componentDidMount() {\n    const today = this.ymd(new Date());\n    // theme preference (persists across days)\n    let theme = 'latte';\n    try { const tt = localStorage.getItem('wb_theme'); if (tt) theme = tt; } catch (e) {}\n    if (!this.THEMES[theme]) theme = this.props.theme || 'latte';\n    // streak (the one thing we keep)\n    let streak = { count: 0, lastDone: null };\n    try { const s = localStorage.getItem('wb_streak'); if (s) streak = JSON.parse(s); } catch (e) {}\n    // today's in-progress plan (ephemeral \\u2014 tomorrow starts clean)\n    let today_state = null;\n    try {\n      const raw = localStorage.getItem('wb_today');\n      if (raw) { const t = JSON.parse(raw); if (t.date === today) today_state = t; }\n    } catch (e) {}\n    const restore = today_state\n      ? { view: today_state.view === 'transition' ? 'chat' : today_state.view, domainIndex: today_state.domainIndex, phase: today_state.phase, data: today_state.data, messages: today_state.messages, activeTab: today_state.activeTab }\n      : {};\n    this.setState({ theme, streak, ...restore }, () => this.applyTheme(theme));\n  }\n\n  componentDidUpdate() {\n    try {\n      if (this.state.view === 'welcome') {\n        localStorage.removeItem('wb_today');\n      } else {\n        const { view, domainIndex, phase, data, messages, activeTab } = this.state;\n        localStorage.setItem('wb_today', JSON.stringify({ date: this.ymd(new Date()), view, domainIndex, phase, data, messages, activeTab }));\n      }\n    } catch (e) {}\n    if (this.state.view === 'chat' && this.msgRef.current) {\n      this.msgRef.current.scrollTop = this.msgRef.current.scrollHeight;\n    }\n  }\n\n  completeMorning() {\n    const today = this.ymd(new Date());\n    const yest = this.ymd(new Date(Date.now() - 86400000));\n    let { count, lastDone } = this.state.streak || { count: 0, lastDone: null };\n    if (lastDone === today) { /* already counted today */ }\n    else if (lastDone === yest) { count = count + 1; }\n    else { count = 1; }\n    const streak = { count, lastDone: today };\n    this.setState({ streak });\n    try { localStorage.setItem('wb_streak', JSON.stringify(streak)); } catch (e) {}\n  }\n\n  applyTheme(name) {\n    const T = this.THEMES[name] || this.THEMES.latte;\n    const el = this.rootRef.current;\n    if (!el) return;\n    Object.keys(T).forEach(k => el.style.setProperty('--' + k, T[k]));\n  }\n  setTheme(name) { this.setState({ theme: name }, () => this.applyTheme(name)); try { localStorage.setItem('wb_theme', name); } catch (e) {} }\n\n  start() {\n    const d = this.DOMAINS[0];\n    this.setState({ view:'chat', domainIndex:0, phase:'result', messages:[ { from:'coach', text:d.resultQ } ], draft:'' });\n  }\n\n  goTransition(next) {\n    const d = this.DOMAINS[next];\n    this.setState({ view:'transition', domainIndex: next, phase:'result', messages:[ { from:'coach', text:d.resultQ } ], draft:'' });\n    this.clearTrans();\n    this.transTimer = setTimeout(() => this.startSection(), 2400);\n  }\n  startSection() { this.clearTrans(); this.setState({ view:'chat' }); }\n  clearTrans() { if (this.transTimer) { clearTimeout(this.transTimer); this.transTimer = null; } }\n\n  onDraft(e) { this.setState({ draft: e.target.value }); }\n  onKey(e) { if (e.key === 'Enter') { e.preventDefault(); this.submit(); } }\n\n  submit() {\n    const text = (this.state.draft || '').trim();\n    if (!text) return;\n    if (this.state.phase === 'actions') { this.addAction(text); return; }\n    const dom = this.DOMAINS[this.state.domainIndex];\n    const data = { ...this.state.data, [dom.key]: { ...this.state.data[dom.key] } };\n    const msgs = [...this.state.messages, { from:'user', text }];\n    if (this.state.phase === 'result') {\n      data[dom.key].result = text;\n      msgs.push({ from:'coach', text: dom.purposeAck });\n      this.setState({ data, messages: msgs, draft:'', phase:'purpose' });\n    } else if (this.state.phase === 'purpose') {\n      data[dom.key].purpose = text;\n      msgs.push({ from:'coach', text: dom.actionsAck });\n      this.setState({ data, messages: msgs, draft:'', phase:'actions' });\n    }\n  }\n\n  addAction(text) {\n    const dom = this.DOMAINS[this.state.domainIndex];\n    const cur = this.state.data[dom.key];\n    const data = { ...this.state.data, [dom.key]: { ...cur, actions:[...cur.actions, { text, leverage:false, done:false }] } };\n    this.setState({ data, draft:'' });\n  }\n  removeAction(i) {\n    const dom = this.DOMAINS[this.state.domainIndex];\n    const cur = this.state.data[dom.key];\n    const data = { ...this.state.data, [dom.key]: { ...cur, actions: cur.actions.filter((_, idx) => idx !== i) } };\n    this.setState({ data });\n  }\n\n  doneActions() {\n    const dom = this.DOMAINS[this.state.domainIndex];\n    if (this.state.data[dom.key].actions.length === 0) return;\n    const msgs = [...this.state.messages,\n      { from:'coach', text: dom.leverageTip },\n      { from:'coach', text:\"Now tap the one action that gives you the most leverage.\" }];\n    this.setState({ messages: msgs, phase:'leverage' });\n  }\n\n  pickLeverage(i) {\n    const dom = this.DOMAINS[this.state.domainIndex];\n    const cur = this.state.data[dom.key];\n    const data = { ...this.state.data, [dom.key]: { ...cur, actions: cur.actions.map((a, idx) => ({ ...a, leverage: idx === i })) } };\n    const chosen = cur.actions[i].text;\n    const msgs = [...this.state.messages, { from:'user', text:'\\u2605 ' + chosen }];\n    const next = this.state.domainIndex + 1;\n    if (next < this.DOMAINS.length) {\n      this.setState({ data, messages: msgs }, () => this.goTransition(next));\n    } else {\n      this.setState({ data, messages: msgs }, () => { this.completeMorning(); this.setState({ view:'summary', activeTab:'plan' }); });\n    }\n  }\n\n  toggleDone(key, i) {\n    const cur = this.state.data[key];\n    const data = { ...this.state.data, [key]: { ...cur, actions: cur.actions.map((a, idx) => idx === i ? { ...a, done: !a.done } : a) } };\n    this.setState({ data });\n  }\n\n  reset() {\n    try { localStorage.removeItem('wb_today'); } catch (e) {}\n    this.stopMic();\n    this.clearTrans();\n    this.setState({ view:'welcome', domainIndex:0, phase:'result', data:this.freshData(), messages:[], draft:'', micError:'', activeTab:'plan' });\n  }\n\n  clearMicTimer() { if (this.micTimer) { clearTimeout(this.micTimer); this.micTimer = null; } }\n  stopMic() { this.clearMicTimer(); if (this.rec) { try { this.rec.stop(); } catch (e) {} } this.setState({ listening:false }); }\n\n  toggleMic() {\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    if (!SR) { this.setState({ micUnsupported:true, micError:'' }); return; }\n    if (this.state.listening) { this.stopMic(); return; }\n    let rec;\n    try { rec = new SR(); } catch (e) { this.setState({ micUnsupported:true }); return; }\n    rec.lang = 'en-US';\n    rec.interimResults = true;\n    rec.continuous = false;\n    rec.maxAlternatives = 1;\n    rec.onresult = (e) => {\n      let out = '';\n      for (let i = 0; i < e.results.length; i++) out += e.results[i][0].transcript;\n      this.setState({ draft: out, micError:'' });\n    };\n    rec.onend = () => { this.clearMicTimer(); this.setState({ listening:false }); };\n    rec.onerror = (ev) => {\n      this.clearMicTimer();\n      let msg = '';\n      const err = ev && ev.error;\n      if (err === 'not-allowed' || err === 'service-not-allowed') msg = \"Microphone access is off \\u2014 turn it on in settings, or just type below.\";\n      else if (err === 'no-speech') msg = \"Didn't catch that. Tap the mic and try again, or type below.\";\n      else if (err === 'audio-capture') msg = \"No microphone found \\u2014 you can type instead.\";\n      else if (err === 'aborted') msg = '';\n      else msg = \"Voice had a hiccup \\u2014 try again, or type below.\";\n      this.setState({ listening:false, micError: msg });\n    };\n    this.rec = rec;\n    this.setState({ listening:true, micError:'' });\n    try { rec.start(); } catch (e) { this.setState({ listening:false, micError:\"Couldn't start voice \\u2014 you can type instead.\" }); return; }\n    // safety auto-stop (iOS sometimes never fires onend)\n    this.clearMicTimer();\n    this.micTimer = setTimeout(() => this.stopMic(), 9000);\n  }\n\n  renderVals() {\n    const st = this.state;\n    const now = new Date();\n    const dateStr = now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });\n    const dateShort = now.toLocaleDateString('en-GB', { day:'numeric', month:'short' }).toUpperCase();\n    const dom = this.DOMAINS[st.domainIndex];\n    const phaseIsLeverage = st.phase === 'leverage';\n\n    // Morning Thought \\u2014 stable per day, climbs through the year\n    const doy = this.dayOfYear(now);\n    const thoughtText = this.THOUGHTS[doy % this.THOUGHTS.length];\n    const thoughtLabel = \"Bunny's Thought  \\u00b7  No. \" + doy;\n\n    // Streak (momentum) \\u2014 shown only if unbroken (done today or yesterday)\n    const today = this.ymd(now);\n    const yest = this.ymd(new Date(now.getTime() - 86400000));\n    const sc = st.streak || { count: 0, lastDone: null };\n    const streakActive = sc.count > 0 && (sc.lastDone === today || sc.lastDone === yest);\n    const displayStreak = streakActive ? sc.count : 0;\n    const showStreak = displayStreak > 0;\n    const streakLabel = displayStreak + ' day momentum';\n\n    const messages = st.messages.map(m => {\n      const coach = m.from === 'coach';\n      return {\n        text: m.text, isCoach: coach,\n        rowStyle: `display:flex;gap:8px;align-items:flex-end;margin:9px 0;justify-content:${coach ? 'flex-start' : 'flex-end'};`,\n        bubbleStyle: coach\n          ? 'max-width:76%;background:var(--coach);color:var(--ink);border:1px solid var(--line);padding:11px 14px;border-radius:18px 18px 18px 6px;font-size:14.5px;line-height:1.5;box-shadow:0 1px 2px rgba(0,0,0,0.03);animation:msgIn .28s ease both;'\n          : 'max-width:76%;background:var(--user);color:var(--ink);padding:11px 14px;border-radius:18px 18px 6px 18px;font-size:14.5px;line-height:1.5;font-weight:600;animation:msgIn .28s ease both;',\n      };\n    });\n\n    const acts = (st.data[dom.key] && st.data[dom.key].actions) || [];\n    const currentActions = acts.map((a, i) => ({\n      text: phaseIsLeverage ? (a.leverage ? '\\u2605 ' + a.text : a.text) : a.text + '   \\u00d7',\n      onPick: phaseIsLeverage ? (() => this.pickLeverage(i)) : (() => this.removeAction(i)),\n      chipStyle: (phaseIsLeverage\n        ? (a.leverage ? 'background:var(--accent);color:#fff;border:1px solid var(--accent);'\n                      : 'background:var(--panel);color:var(--ink);border:1px solid var(--line);')\n        : 'background:var(--accent-soft);color:var(--ink);border:1px solid var(--line);')\n        + 'padding:9px 13px;border-radius:14px;font-size:14px;font-family:Nunito,sans-serif;font-weight:600;cursor:pointer;',\n    }));\n\n    const progress = this.DOMAINS.map((d, i) => {\n      const stt = i < st.domainIndex ? 'done' : (i === st.domainIndex ? 'cur' : 'up');\n      const dotStyle = stt === 'done'\n        ? 'width:9px;height:9px;border-radius:50%;background:var(--accent);'\n        : stt === 'cur'\n          ? 'width:22px;height:9px;border-radius:5px;background:var(--accent);'\n          : 'width:9px;height:9px;border-radius:50%;background:var(--line);';\n      return { dotStyle };\n    });\n\n    const summaryDomains = this.DOMAINS.map(d => {\n      const dd = st.data[d.key];\n      return {\n        label: d.label, result: dd.result || '\\u2014', purpose: dd.purpose || '',\n        actions: dd.actions.map((a, i) => ({\n          text: a.text, leverage: a.leverage, check: a.done ? '\\u2713' : '',\n          onToggle: () => this.toggleDone(d.key, i),\n          boxStyle: `flex:none;width:22px;height:22px;border-radius:7px;border:2px solid ${a.done ? 'var(--accent)' : 'var(--muted)'};background:${a.done ? 'var(--accent)' : 'transparent'};color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px;`,\n          textStyle: `font-size:14.5px;line-height:1.4;${a.done ? 'text-decoration:line-through;color:var(--muted);' : 'color:var(--ink);'}`,\n        })),\n      };\n    });\n\n    const cardDomains = this.DOMAINS.map(d => {\n      const dd = st.data[d.key];\n      const lev = dd.actions.find(a => a.leverage);\n      return { label: d.label, result: dd.result || '\\u2014', hasLever: !!lev, lever: lev ? lev.text : '' };\n    });\n\n    const themeSwatches = Object.keys(this.THEMES).map(name => {\n      const T = this.THEMES[name];\n      const active = st.theme === name;\n      return {\n        onPick: () => this.setTheme(name),\n        ringStyle: `padding:3px;border-radius:14px;border:2px solid ${active ? T.accent : 'transparent'};cursor:pointer;transition:border-color .2s;`,\n        swatchStyle: 'display:flex;width:54px;height:36px;border-radius:10px;overflow:hidden;box-shadow:0 2px 6px -2px rgba(0,0,0,0.2);',\n        bgStyle: `flex:1;background:${T.bg};`,\n        accStyle: `width:17px;background:${T.accent};`,\n      };\n    });\n\n    const themeMini = Object.keys(this.THEMES).map(name => {\n      const T = this.THEMES[name];\n      const active = st.theme === name;\n      return {\n        onPick: () => this.setTheme(name),\n        dotStyle: `width:13px;height:13px;border-radius:50%;background:${T.accent};cursor:pointer;box-shadow:0 0 0 ${active ? '2px var(--bg), 0 0 0 3.5px ' + T.accent : '0 transparent'};transition:box-shadow .2s;`,\n      };\n    });\n\n    const tabBase = 'padding:8px 20px;border:none;border-radius:11px;font-family:Nunito,sans-serif;font-weight:800;font-size:14px;cursor:pointer;';\n    const isPlan = st.activeTab === 'plan';\n\n    return {\n      rootRef: this.rootRef, msgRef: this.msgRef,\n      isWelcome: st.view === 'welcome', isChat: st.view === 'chat', isSummary: st.view === 'summary', isTransition: st.view === 'transition',\n      sectionName: dom.label, sectionSubtitle: dom.subtitle || '',\n      transLabel: dom.label, transText: dom.transitionIn || '', onContinue: () => this.startSection(),\n      showMicError: !!st.micError, micError: st.micError || '',\n      dateStr, dateShort, thoughtText, thoughtLabel, showStreak, streakLabel,\n      stepLabel: dom.label + ' \\u00b7 ' + (st.phase.charAt(0).toUpperCase() + st.phase.slice(1)),\n      messages, progress, currentActions,\n      showActionsPanel: st.phase === 'actions' || st.phase === 'leverage',\n      panelHint: st.phase === 'actions' ? 'Tap a chip to remove it. Add as many as you like.' : 'Tap the one with the most leverage.',\n      showDoneBtn: st.phase === 'actions' && acts.length > 0,\n      showInput: st.phase !== 'leverage',\n      placeholder: st.phase === 'actions' ? 'Add an action\\u2026' : 'Type, or tap the mic\\u2026',\n      draft: st.draft, micUnsupported: st.micUnsupported,\n      micStyle: `width:54px;height:54px;flex:none;border:1px solid ${st.listening ? 'var(--accent)' : 'var(--line)'};border-radius:50%;background:${st.listening ? 'var(--accent)' : 'var(--panel)'};color:${st.listening ? '#fff' : 'var(--accent)'};cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;${st.listening ? 'animation:micpulse 1.4s infinite;' : ''}`,\n      summaryDomains, cardDomains, themeSwatches, themeMini,\n      isPlan, isCard: !isPlan,\n      tabPlanStyle: tabBase + (isPlan ? 'background:var(--accent);color:#fff;' : 'background:transparent;color:var(--muted);'),\n      tabCardStyle: tabBase + (!isPlan ? 'background:var(--accent);color:#fff;' : 'background:transparent;color:var(--muted);'),\n      onStart: () => this.start(),\n      onDraft: (e) => this.onDraft(e), onKey: (e) => this.onKey(e), onSubmit: () => this.submit(),\n      onDoneActions: () => this.doneActions(), onMic: () => this.toggleMic(),\n      onReset: () => this.reset(), onTabPlan: () => this.setState({
